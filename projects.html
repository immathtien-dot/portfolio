<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linsey | Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Ballet:opsz@16..72&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel='stylesheet' href="css/baguetteBox.css">
</head>

<body class="projects-body">
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1>Linsey</h1>
            </div>
            <div class="nav">
                <button class='hamburger'>☰</button>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Project</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="projects-page">
        <section class="projects-shelves">
            <div class="shelf">
                <div class="shelf-line"></div>
                <a href="projects/project-template/camera.html" class="project-item item-camera">
                    <img src="public/images/projects/camera.png" alt="Camera project">
                </a>
            </div>

            <div class="shelf">
                <div class="shelf-line"></div>
                <a href="projects/project-template/ipod.html" class="project-item item-ipod">
                    <img src="public/images/projects/ipod.png" alt="iPod project">
                </a>
            </div>

            <div class="shelf">
                <div class="shelf-line"></div>
                <a href="projects/project-template/tv.html" class="project-item item-tv">
                    <img src="public/images/projects/tv.png" alt="TV project">
                </a>
            </div>

            <div class="shelf">
                <div class="shelf-line"></div>
                <a href="projects/project-template/album.html" class="project-item item-album">
                    <img src="public/images/projects/album.png" alt="Album project">
                </a>
            </div>
            <div class="shelf">
                <div class="shelf-line"></div>
                <a href="projects/project-template/letter.html" class="project-item item-letter">
                    <img src="public/images/projects/letter.png" alt="Letter project">
                </a>
            </div>
            <div class="shelf">
                <div class="shelf-line"></div>
                <a href="projects/project-template/menu.html" class="project-item item-menu">
                    <img src="public/images/projects/menu.png" alt="Menu project">
                </a>
            </div>
        </section>

        <section class="projects-title">
            <div class="projects-heading">
                <h2>selected <span>works</span></h2>
            </div>
            <p class="projects-text">
                This selection gathers works that reflect my interest in visual culture, digital archives, and imagery.
            </p>

            <div class="projects-note">
                <p>
              
                    Each project experiments with different formats—from photography to web-based media—to explore how
                    we document and remember moments.
                </p>
            </div>
        </section>
    </main>

    <script src="js/hamburger.js"></script>
    <script src="js/baguetteBox.js"></script>
    <script>
        baguetteBox.run('.flex-container-grid', {
            captions: true
        })
    </script>
</body>

</html>
